      <script>
        // When the user scrolls down 80px from the top of the document, resize the navbar's padding and the logo's font size
        window.onscroll = function() {scrollFunction()};
        
        function scrollFunction() {
          if (document.body.scrollTop > 80 || document.documentElement.scrollTop > 80) {
            document.getElementById("navd").style.color = "black";
            document.getElementById("l1").style.color = "black";
            document.getElementById("l2").style.color = "black";
            document.getElementById("l3").style.color = "black";
            document.getElementById("l4").style.color = "black";
            document.getElementById("navb").style.transitionDelay = "0.09s";
            document.getElementById("navb").classList.remove('bg-transparent');
            document.getElementById("navb").classList.add('navbar-light');
            document.getElementById("navb").classList.add('bg-light');
          } else {
            document.getElementById("navd").style.color = "white";
            document.getElementById("l1").style.color = "white";
            document.getElementById("l2").style.color = "white";
            document.getElementById("l3").style.color = "white";
            document.getElementById("l4").style.color = "white";
            // document.getElementById("navb").style.removeProperty('transitionDelay');
            document.getElementById("navb").style.transitionDelay = "0.2s";
            document.getElementById("navb").classList.add('navbar-dark');
            document.getElementById("navb").classList.add('bg-transparent');

          }
        }
        </script>
